name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: marias-tacos/package-lock.json

      - name: Install and build
        working-directory: marias-tacos
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run export

      - name: Copy static site to repository root
        run: |
          cp -r marias-tacos/out/. .
          touch .nojekyll

      - name: Commit and push deployed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .nojekyll index.html 404.html icon.svg favicon.ico menu contact gallery index.txt 404 _next
          if ! git diff --staged --quiet; then
            git commit -m "Deploy site to GitHub Pages [skip ci]"
            git push origin HEAD:main
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: marias-tacos/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
